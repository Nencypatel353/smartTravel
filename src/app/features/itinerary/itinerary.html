<div class="trip-composer">

  <div class="composer-header">
    <h2>Plan your trip with AI</h2>
    <p>Tell us a few details and let SmartTravel design your journey.</p>
  </div>

  <!-- DESTINATION -->
  <div class="composer-group">
    <label>Destination</label>
    <select [(ngModel)]="selectedState">
      @for (state of statesAndUTs; track state) {
        <option [value]="state">{{ state }}</option>
      }
    </select>
  </div>

  <!-- DAYS -->
  <div class="composer-group">
    <label>Trip Duration</label>
    <div class="day-control">
      <button (click)="days = days - 1" [disabled]="days <= 2">−</button>
      <span>{{ days }} Days</span>
      <button (click)="days = days + 1" [disabled]="days >= 10">+</button>
    </div>
  </div>

  <!-- PACE -->
  <div class="composer-group">
    <label>Travel Pace</label>
    <div class="pace-options">
      @for (paceOption of paceOptions; track paceOption) {
        <button
          (click)="pace = paceOption"
          [class.active]="pace === paceOption">
          {{ paceOption }}
        </button>
      }
    </div>
  </div>

  <!-- CTA -->
  <button class="generate-btn" (click)="generateItinerary()">
    ✨ Generate My Itinerary
  </button>

</div>

<!-- LOADING -->
<div *ngIf="loading">
  Generating your AI travel plan...
</div>

<!-- RESULT -->
<div *ngIf="itinerary" class="itinerary-result">
  <h3>Your AI Travel Plan</h3>
  <pre>{{ itinerary }}</pre>
</div>
